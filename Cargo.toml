[package]
name = "slint-rust-template"
version = "0.1.0"
edition = "2024"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[dependencies]
slint = { version = "1.17.1", default-features = false, features = [
  "backend-winit",      # 窗口管理# 开启纯 CPU 软件渲染后端
  "compat-1-2",         # 保持向前兼容性
  "unstable-winit-030",
] }
slint_borderless_windows = { git = "https://github.com/Drew-Chase/slint_borderless_windows.git" }
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = [
  "Win32_UI_WindowsAndMessaging",
  "Win32_Graphics_Gdi",
] }
raw-window-handle = "0.6"
winit = "0.30"


[build-dependencies]
slint-build = "1.17.1"

[profile.release]
opt-level = 3      # 开启最高性能优化，保证 UI 渲染和事件循环的绝对流畅
lto = "thin"       # 使用 ThinLTO，兼顾了“跨 Crate 优化”与“较快的编译速度”
codegen-units = 16 # 保持默认或适当降低，兼顾多核编译速度与优化质量
